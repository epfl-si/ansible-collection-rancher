# Secrets internal to gitlab
#
# to edit the encrypted secrets below, you need eyaml installed.
# Familiarize yourself with
# https://puppet.com/blog/encrypt-your-data-using-hiera-eyaml first.
# The edit command goes like this,
#
#   ansible-deps-cache/bin/eyaml edit -d \
#     --pkcs7-public-key eyaml/epfl_gitlab.pkcs7.pem \
#     roles/gitlab-serving/vars/serving-secrets.yml
#
# 💡 This *will not* decrypt anything for you because chances are, you
# don't need to decrypt secrets (YA RLY). For those cases where you
# do, wielding the private key from Keybase is left as an exercise to
# the reader.

gitlab_secrets:
  gitlab_workhorse:
    secret_token: "{{ _gitlab_workhorse_secret_token | eyaml(eyaml_keys) }}"
  gitlab_shell:
    secret_token:  "{{ _gitlab_shell_secret_token | eyaml(eyaml_keys) }}"
  gitlab_rails:
    secret_key_base: "{{ _gitlab_rails_secret_key_base | eyaml(eyaml_keys) }}"
    db_key_base: "{{ _gitlab_rails_db_key_base | eyaml(eyaml_keys) }}"
    # https://docs.gitlab.com/omnibus/update/gitlab_13_changes.html
    encrypted_settings_key_base: "{{ _gitlab_encrypted_settings_key_base | eyaml(eyaml_keys) }}"
    otp_key_base: "{{ _gitlab_rails_otp_key_base | eyaml(eyaml_keys) }}"
    openid_connect_signing_key: "{{ _gitlab_rails_openid_connect_signing_key | eyaml(eyaml_keys) }}"
    ci_jwt_signing_key: "{{ _gitlab_rails_ci_jwt_signing_key | eyaml(eyaml_keys) }}"

_gitlab_workhorse_secret_token: ENC[PKCS7,]
_gitlab_shell_secret_token: ENC[PKCS7,]
_gitlab_rails_secret_key_base: ENC[PKCS7,]
_gitlab_rails_db_key_base: ENC[PKCS7,]
_gitlab_rails_otp_key_base: ENC[PKCS7,]
_gitlab_rails_openid_connect_signing_key: ENC[PKCS7,]
_gitlab_rails_ci_jwt_signing_key: ENC[PKCS7,]
_gitlab_encrypted_settings_key_base: ENC[PKCS7,]
