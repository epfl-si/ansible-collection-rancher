# To edit the encrypted secrets below, you need eyaml installed.
# Familiarize yourself with
# https://puppet.com/blog/encrypt-your-data-using-hiera-eyaml first.
# The edit command goes like this,
#
#   ansible-deps-cache/bin/eyaml edit -d \
#       --pkcs7-public-key eyaml/epfl_gitlab.pkcs7.pem \
#       roles/rke2-gitlab/vars/openid-secret.yml
#
# 💡 This *will not* decrypt anything for you because chances are, you
# don't need to decrypt secrets (YA RLY). For those cases where you
# do, wielding the private key from Keybase is left as an exercise to
# the reader.

# Documentation: https://docs.gitlab.com/administration/auth/oidc/
epfl_provider:
  name: "oidc_entra_epfl"
  label: "EPFL"
  args:
    name: "oidc_entra_epfl"
    strategy_class: "OmniAuth::Strategies::OpenIDConnect"
    scope: ["openid", "profile", "email"]
    response_type: "code"
    issuer:  "https://login.microsoftonline.com/{{ epfl_app_tenant_id }}/v2.0"
    client_auth_method: "basic"
    discovery: false
    # Sciper ID
    uid_field: "uniqueid"
    pkce: true
    client_options:
      identifier: "{{ epfl_app_client_id }}"
      secret: "{{ epfl_app_client_secret }}"
      redirect_uri: "https://{{ gitlab_hostname }}/users/auth/oidc_entra_epfl/callback"
      end_session_endpoint: "https://login.microsoftonline.com/{{ epfl_app_tenant_id }}/oauth2/v2.0/logout"
      authorization_endpoint: "https://login.microsoftonline.com/{{ epfl_app_tenant_id }}/oauth2/v2.0/authorize"
      token_endpoint: "https://login.microsoftonline.com/{{ epfl_app_tenant_id }}/oauth2/v2.0/token"
      userinfo_endpoint: "https://graph.microsoft.com/oidc/userinfo"
      jwks_uri: "https://login.microsoftonline.com/{{ epfl_app_tenant_id }}/discovery/v2.0/keys?appid={{ epfl_app_client_id }}"

# Documentation: https://help.switch.ch/eduid/docs/services/openid-connect/
guest_provider:
  name: "oidc_switch_edu_id_guest"
  label: "Externe"
  args:
    name: "oidc_switch_edu_id_guest"
    strategy_class: "OmniAuth::Strategies::OpenIDConnect"
    scope: ["openid", "profile", "email", "https://login.eduid.ch/authz/User.Read"]
    response_type: "code"
    issuer:  "https://login.eduid.ch/"
    client_auth_method: "basic"
    discovery: false
    uid_field: "swissEduIDLinkedAffiliationUniqueID"
    pkce: true
    client_options:
      identifier: "{{ guest_app_client_id }}"
      redirect_uri: "https://{{ gitlab_hostname }}/users/auth/oidc_switch_edu_id_guest/callback"
      end_session_endpoint: "https://login.eduid.ch/idp/profile/oauth2/revocation"
      authorization_endpoint: "https://login.eduid.ch/idp/profile/oidc/authorize"
      token_endpoint: "https://login.eduid.ch/idp/profile/oidc/token"
      userinfo_endpoint: "https://login.eduid.ch/idp/profile/oidc/userinfo"
      jwks_uri: "https://login.eduid.ch/idp/profile/oidc/keyset"

epfl_app_tenant_id: >-
  {{
  "ENC[PKCS7,]"
  | eyaml(gitlab_credentials.eyaml_keys) }}
epfl_app_client_id: >-
  {{
  "ENC[PKCS7,]"
  | eyaml(gitlab_credentials.eyaml_keys) }}
epfl_app_client_secret: >-
  {{
  "ENC[PKCS7,]"
  | eyaml(gitlab_credentials.eyaml_keys) }}
  
guest_app_client_id:  >-
  {{
  "ENC[PKCS7,]"
  | eyaml(gitlab_credentials.eyaml_keys) }}
  