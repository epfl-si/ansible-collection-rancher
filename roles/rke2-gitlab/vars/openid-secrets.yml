# Documentation: https://docs.gitlab.com/administration/auth/oidc/
openid_provider:
  name: "openid_connect"
  label: "Azure OIDC"
  args:
    name: "openid_connect"
    scope: ["openid", "profile", "email"]
    response_type: "code"
    issuer:  "https://login.microsoftonline.com/{{ app_tenant_id }}/v2.0"
    client_auth_method: "basic"
    discovery: false
    uid_field: "preferred_username"
    pkce: true
    client_options:
      identifier: "{{ app_client_id }}"
      secret: "{{ app_client_secret }}"
      redirect_uri: "https://{{ gitlab_hostname }}/users/auth/openid_connect/callback"
      end_session_endpoint: "https://login.microsoftonline.com/{{ app_tenant_id }}/oauth2/v2.0/logout"
      authorization_endpoint: "https://login.microsoftonline.com/{{ app_tenant_id }}/oauth2/v2.0/authorize"
      token_endpoint: "https://login.microsoftonline.com/{{ app_tenant_id }}/oauth2/v2.0/token"
      userinfo_endpoint: "https://graph.microsoft.com/oidc/userinfo"
      jwks_uri: "https://login.microsoftonline.com/{{ app_tenant_id }}/discovery/v2.0/keys?appid={{ app_client_id }}"

app_tenant_id: >-
  {{
  "ENC[PKCS7,]"
  | eyaml(gitlab_credentials.eyaml_keys) }}
app_client_id: >-
  {{
  "ENC[PKCS7,]"
  | eyaml(gitlab_credentials.eyaml_keys) }}
app_client_secret: >-
  {{
  "ENC[PKCS7,]"
  | eyaml(gitlab_credentials.eyaml_keys) }}
