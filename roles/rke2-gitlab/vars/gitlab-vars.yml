gitlab_hostname: gitlab.epfl.ch
gitlab_tls_private_key: >-
  {{ tls_credentials.gitlab.key
          | eyaml(tls_credentials.eyaml_keys) }}

# This is actually only a guess, as the actual allocation takes place in portal-XaaS:
gitlab_repo_volume_size: 1Ti

gitlab_email_sender_address: gitlab-noreply@epfl.ch

gitlab_charts_common_values:
      # Documentation: https://docs.gitlab.com/charts/charts/globals/#configure-host-settings
      global:
        gitlabVersion: "{{ gitlab_version }}"
        edition: ce
        time_zone: "Europe/Zurich"
        hosts:
          domain: "{{ gitlab_hostname }}"
          gitlab:
            name: "{{ gitlab_hostname }}"

        email:
          from: "{{ gitlab_email_sender_address }}"
          reply_to: "{{ gitlab_email_sender_address }}"
        smtp:
          enabled: true
          address: mail.epfl.ch
          port: 25
          authentication: ""

        extraEnv:
          GITLAB_LOG_LEVEL: error

        # Things we don't want:
        minio:
          enabled: false
        kas:
          enabled: false
        registry:
          enabled: false
        appConfig:
          lfs:       { enabled: false }
        ingress:
          configureCertmanager: false

        # These are the default values within the `gitlab` chart, but
        # both charts rendezvous through them so we want them set
        # the same way on the Gitaly side:
        shell:
          authToken:
            secret: gitlab-gitlab-shell-secret
        gitaly:
          authToken:
            secret: gitlab-gitaly-secret

      # More things we don't want:
      certmanager:
        install: false
      certmanager-issuer:
        install: false
      registry:
        enabled: false

      # These are not multi-tenant (e.g. they have clashing
      # `ClusterRole`-level RBAC) and thus need to be disabled
      # in the test namespace:
      prometheus:
        server:
          useExistingClusterRoleName: >-
            {{ "" if inventory_deployment_stage == "prod"
            else "gitlab-prometheus-server" }}
