- tags: always
  include_vars: gitlab-vars.yml

- tags: always
  include_vars:
    name: tls_credentials
    file: tls-credentials.yml

- name: "TLS certificate"
  epfl_si.k8s.k8s:
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: gitlab-tls
        namespace: "{{ inventory_namespace }}"
      stringData:
        tls.key: "{{ gitlab_tls_private_key }}"
        tls.crt: |
          {{ tls_credentials.gitlab.certificate }}
          {{ tls_credentials.digicert.operational_ca_certificate }}

- name: "TLS Certificate Signing Request (CSR)"
  delegate_to: localhost
  tags:
    - never
    - gitlab.tls.csr
  run_once: true
  community.crypto.openssl_csr:
    path: "{{ playbook_dir }}/gitlab.csr"
    privatekey_content: "{{ gitlab_tls_private_key }}"
    common_name: "{{ gitlab_hostname }}"
    subject_alt_name: 'DNS:{{ gitlab_hostname }}'
  register: _csr

- tags: gitlab.tls.csr
  when: (_csr | default({})) is changed
  ansible.builtin.pause:
    prompt: |
      🛑 {{ playbook_dir }}/gitlab.csr generated; please create
      the {{ gitlab_hostname }} certificate at your favorite CA.

      Instructions for the EPFL CA are available at https://rauth.epfl.ch/

      Once you're done, please put the certificate into
      {{ playbook_dir }}/roles/rke2-gitlab/vars/tls-credentials.yml
      and run `gitsible` again.

- name: "Redirect HTTP to HTTP/S: Træfik middleware"
  epfl_si.k8s.k8s:
    definition:
      apiVersion: traefik.io/v1alpha1
      kind: Middleware
      metadata:
        name: redirect-to-https
        namespace: "{{ inventory_namespace }}"
        annotations:
          kubernetes.io/ingress.class: traefik
      spec:
        redirectScheme:
          scheme: https
          permanent: true

- name: "Redirect HTTP to HTTP/S: Træfik route"
  epfl_si.k8s.k8s:
    definition:
      apiVersion: traefik.io/v1alpha1
      kind: IngressRoute
      metadata:
        name: redirect-to-https
        namespace: "{{ inventory_namespace }}"
        annotations:
          kubernetes.io/ingress.class: traefik
      spec:
        entryPoints:
          - web
        routes:
          - kind: Rule
            priority: 50   # The one of the route created by the Ingress object is 42
            match: "Host(`{{ gitlab_hostname }}`)"
            services:
              # This is not actually used, but Træfik whines if it's not there.
              - name: gitlab-webservice-default
                port: 8080
            middlewares:
              - name: redirect-to-https
