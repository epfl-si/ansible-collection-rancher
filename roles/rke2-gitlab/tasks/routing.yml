- name: "LoadBalancer Service for ingress"
  with_items:
    - name: gitlab-ingress-ipv4
      ipFamily: "IPv4"
      vip: >-
        {{ lookup("community.general.dig", gitlab_hostname) }}
      pool: gitlab
    - name: gitlab-ingress-ipv6
      ipFamily: "IPv6"
      vip: >-
        {{ lookup("community.general.dig", gitlab_hostname,
        qtype="AAAA") }}
      pool: gitlab
  epfl_si.k8s.k8s:
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: "{{ item.name }}"
        namespace: kube-system
        annotations:
          metallb.universe.tf/address-pool: "{{ item.pool }}"
      spec:
        selector:
          app.kubernetes.io/name: rke2-traefik
        type: LoadBalancer
        ipFamilies: ["{{ item.ipFamily }}"]
        loadBalancerIP: "{{ item.vip }}"
        ports:
          - name: ssh
            port: 22
            targetPort: 22
            protocol: TCP
          - name: http
            port: 80
            targetPort: web
            protocol: TCP
          - name: https
            port: 443
            targetPort: websecure
            protocol: TCP

- name: "Additional configuration for `rke2-traefik` Helm chart"
  epfl_si.k8s.k8s:
    definition:
      apiVersion: helm.cattle.io/v1
      kind: HelmChartConfig
      metadata:
        name: rke2-traefik
        namespace: kube-system
      spec:
        valuesContent: |
          entryPoints:
            web:
              address: ":80"
            websecure:
              address: ":443"
            gitlab-shell:
              address: ":22"
          additionalArguments:
            # Accept connections on port 22:
            - --entryPoints.gitlab-shell.address=:22
            # Make dashboard visible to people who port-forward 8080:
            - --api.insecure
            # Not shown here: all `Ingress` objects (and `Ingress`-ish
            # objects, such as the `IngressRouteTCP` object for port
            # 22) must have an `kubernetes.io/ingress.class: traefik`
            # annotation set.

- name: "IngressRouteTCP/gitlab-ssh"
  epfl_si.k8s.k8s:
    definition:
      apiVersion: traefik.io/v1alpha1
      kind: IngressRouteTCP
      metadata:
        annotations:
          kubernetes.io/ingress.class: traefik
        name: gitlab-ssh
        namespace: "{{ gitlab_namespace }}"
      spec:
        entryPoints:
        - gitlab-shell
        routes:
        - match: HostSNI(`*`)
          services:
          - name: gitlab-gitlab-shell
            namespace: gitlab
            port: 22
