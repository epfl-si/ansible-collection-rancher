- include_vars: gitlab-vars.yml
  tags: always

- include_tasks:
    file: gitlab-wipe.yml
    apply:
      tags:
        - gitlab.wipe
  tags:
    - never
    - gitlab.wipe

- name: "`namespace/{{ gitlab_namespace }}`"
  epfl_si.k8s.k8s:
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ gitlab_namespace }}"
  tags:
    - gitlab
    - gitlab.website
    - gitlab.routing
    - gitlab.tls
    - gitlab.tls.csr

- include_tasks:
    file: routing.yml
    apply:
      tags:
        - gitlab
        - gitlab.routing
  tags:
    - gitlab
    - gitlab.routing

- include_tasks:
    file: tls.yml
    apply:
      tags:
        - gitlab
        - gitlab.tls
  tags:
    - gitlab
    - gitlab.tls
    - gitlab.tls.csr

- include_tasks:
    file: k8s-gitlab.yml
    apply:
      tags:
        - gitlab
        - gitlab.website
  tags:
    - gitlab
    - gitlab.website

- include_tasks:
    file: k8s-runner.yml
    apply:
      tags:
        - gitlab
        - gitlab.runner   # Obsolescent tag
  tags:
    - gitlab
    - gitlab.runner   # Obsolescent tag