- name: "`PrometheusRule/redis`"
  epfl_si.k8s.k8s:
    definition:
      apiVersion: monitoring.coreos.com/v1
      kind: PrometheusRule
      metadata:
        name: redis
        namespace: "{{ inventory_namespace }}"
      spec:
        groups:
          - name: redis-storage
            rules:
              - alert: RedisStorageMissingDeadlines
                expr: >-
                  rate(redis_aof_delayed_fsync{namespace="{{ inventory_namespace }}"}[10m])
                  > 0
                for: 15m
                annotations:
                  description: >-
                    Redis has been observing `fdatasync(2)` delays that
                    adversely impact its performance.
