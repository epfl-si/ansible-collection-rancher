# CloudNativePG for GitLab

- tags: always
  include_vars: "{{ item }}"
  with_items:
  - postgres-vars.yml
  - ../../../vars/versions.yml

- tags: always
  include_vars:
    name: gitlab_credentials
    file: gitlab-credentials.yml

- when: inventory_deployment_stage == "test"
  block:
  - name: "Read `secret/gitlab-postgresql-password` from production namespace"
    epfl_si.k8s.k8s:
      definition:
        apiVersion: v1
        kind: Secret
        metadata:
          name: postgres-prod-passwords
          namespace: "{{ inventory_namespace }}"
        data: >-
          {{ _secret_orig.data }}

  - name: "`Secret/gitlab-cloudpg-gitlab`"
    epfl_si.k8s.k8s:
      definition:
        apiVersion: v1
        kind: Secret
        metadata:
          name: gitlab-cloudpg-gitlab
          namespace: "{{ inventory_namespace }}"
        type: kubernetes.io/basic-auth
        stringData:
          username: gitlab
          password: "{{ _gitlab_pg_password }}"
  vars:
    _secret_orig: >-
      {{ lookup("epfl_si.k8s.k8s",
         kind="Secret",
         resource_name="gitlab-postgresql-password",
         namespace="gitlab") }}
    _gitlab_pg_password: >-
      {{ _secret_orig.data["postgresql-password"] | b64decode }}

- name: "`Secret/barman-s3-backups`"
  epfl_si.k8s.k8s:
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: barman-s3-backups
        namespace: "{{ inventory_namespace }}"
      stringData:
        ACCESS_KEY_ID: >-
          {{ gitlab_credentials.s3_backups.read_write_access_key_id
          | eyaml(gitlab_credentials.eyaml_keys) }}
        ACCESS_SECRET_KEY: >-
          {{ gitlab_credentials.s3_backups.read_write_secret_access_key
          | eyaml(gitlab_credentials.eyaml_keys) }}

- name: "`Cluster.postgres/gitlab`"
  epfl_si.k8s.k8s:
    definition:
      apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      metadata:
        name: gitlab-cloudpg
        namespace: "{{ inventory_namespace }}"
      spec:
        imageName: ghcr.io/cloudnative-pg/postgresql:{{ postgresql_major_version }}-system-trixie
        instances: 2
        storage:
          size: 8Gi
        affinity:
          topologyKey: kubernetes.io/hostname
        bootstrap:
          initdb:
            import:
              type: monolith
              databases: ["{{ pg_main_rails_database_name }}"]
              roles: [gitlab]
              source:
                externalCluster: gitlab-prod-legacy
            secret:
                name: gitlab-cloudpg-gitlab
        externalClusters:
          - name: gitlab-prod-legacy
            connectionParameters:
              host: gitlab-postgresql.gitlab.svc.cluster.local.
              user: postgres
            password:
              name: "{{ pg_restore_secret_key_ref.name }}"
              key:  "{{ pg_restore_secret_key_ref.key }}"
        env:
          - name: AWS_REQUEST_CHECKSUM_CALCULATION
            value: "WHEN_REQUIRED"
          - name: AWS_RESPONSE_CHECKSUM_VALIDATION
            value: "WHEN_REQUIRED"
        backup:
          barmanObjectStore:
            destinationPath: 's3://{{ _s3.bucket_name }}/barman-{{ inventory_namespace }}'
            endpointURL: '{{ _s3.url }}'
            s3Credentials:
              accessKeyId:
                key: ACCESS_KEY_ID
                name: barman-s3-backups
              secretAccessKey:
                key: ACCESS_SECRET_KEY
                name: barman-s3-backups
          target: prefer-standby
  vars:
    _s3: >-
      {{ gitlab_credentials.s3_backups }}

- name: "`Pooler/gitlab-postgresql`"
  epfl_si.k8s.k8s:
    definition:
      apiVersion: postgresql.cnpg.io/v1
      kind: Pooler
      metadata:
        name: gitlab-postgresql
        namespace: "{{ inventory_namespace }}"
      spec:
        cluster:
          name: gitlab-cloudpg

        instances: 3
        type: rw
        pgbouncer:
          poolMode: session
          parameters:
            max_client_conn: "1000"

- name: "`PodMonitor/gitlab-cloudpg`"
  # Note: the label catches both PostgreSQL and PgBouncer
  epfl_si.k8s.k8s:
    definition:
      apiVersion: monitoring.coreos.com/v1
      kind: PodMonitor
      metadata:
        name: gitlab-cloudpg
        namespace: "{{ inventory_namespace }}"
      spec:
        selector:
          matchLabels:
            cnpg.io/cluster: gitlab-cloudpg
        podMetricsEndpoints:
        - port: metrics


- tags: gitlab.postgres.loadtest
  when: >-
    inventory_deployment_stage == "test"
  name: PostgreSQL load test
  epfl_si.k8s.k8s:
    definition:
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: pgbench
        namespace: "{{ inventory_namespace }}"
      spec:
        template:
          spec:
            containers:
            - name: pgbench
              image: postgres:17
              command: ["pgbench"]
              args: >-
                {{ _pgbench_credentials + _pgbench_loadtest_args }}
              env: "{{ _env }}"
            restartPolicy: Never
            initContainers:
            - name: pgbench-init
              image: postgres:17
              command: ["pgbench"]
              args: >-
                {{ _pgbench_credentials +
                ["-i"] }}
              env: "{{ _env }}"
        backoffLimit: 0
  vars:
    _pgbench_credentials: ["-h", "gitlab-cloudpg-rw",
                           "-U", "gitlab",
                           "{{ pg_main_rails_database_name }}"]
    _pgbench_loadtest_args: [
         "-c", "1",    # Concurrency level. We don't want too heavy a load test
         "-T", "86400" # All day (not every day)
       ]
    _env:
    - name: PGPASSWORD
      valueFrom:
        secretKeyRef:
          name: gitlab-cloudpg-gitlab
          key: password
