- tags: always
  include_vars: tls-vars.yml

- tags: always
  include_vars:
    name: tls_credentials
    file: tls-credentials.yml

- name: "TLS Certificate Signing Request (CSR)"
  delegate_to: localhost
  tags:
    - never
    - tls.csr
  run_once: true
  community.crypto.openssl_csr:
    path: "{{ playbook_dir }}/gitlab.csr"
    privatekey_content: "{{ tls_private_key }}"
    common_name: "{{ tls_certify_hostnames[0] }}"
    subject_alt_name: >-
      {{ _subject_alt_names_yaml | from_yaml }}
  register: _csr
  vars:
    _subject_alt_names_yaml: |
      {% for h in tls_certify_hostnames %}
      - 'DNS:{{ h }}'
      {% endfor %}

- tags: always
  run_once: true
  when: (_csr | default({})) is changed
  ansible.builtin.pause:
    prompt: |
      🛑 {{ playbook_dir }}/gitlab.csr generated; please create
      the certificate at your favorite CA.

      Instructions for the EPFL CA are available at https://rauth.epfl.ch/

      Once you're done, please put the certificate into
      {{ playbook_dir }}/roles/tls-server-certs/vars/tls-credentials.yml
      and run `gitsible` again.

- name: "TLS certificate"
  epfl_si.k8s.k8s:
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: gitlab-tls
        namespace: "{{ inventory_namespace }}"
      stringData:
        tls.key: "{{ tls_private_key }}"
        tls.crt: |
          {{ tls_credentials.gitlab.certificate }}
          {{ tls_credentials.digicert.operational_ca_certificate }}
