- name: ssh access to nodes
  ansible.posix.authorized_key:
    user: root
    state: >-
      {{ item.state | default("present") }}
    key: "{{ item.key }}"

  with_items:
    - key: https://github.com/domq.keys
    - key: https://github.com/ponsfrilus.keys
    - key: https://github.com/laurent-indermuehle.keys
    - key: https://github.com/dwesh163.keys
    - key: https://github.com/xpl0z.keys
