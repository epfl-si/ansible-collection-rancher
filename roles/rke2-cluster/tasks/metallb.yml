- tags: always
  include_vars: ../../../vars/versions.yml

- name: "`ClusterRepo/metallb`"
  epfl_si.k8s.k8s:
    definition:
      apiVersion: catalog.cattle.io/v1
      kind: ClusterRepo
      metadata:
        name: metallb
      spec:
        url: https://metallb.github.io/metallb

- name: "`metallb/metallb` Helm chart"
  epfl_si.rancher.rancher_helm_chart:
    repository: metallb
    chart: metallb
    namespace:
      name: "{{ rke2_metallb_namespace }}"
      owned: true
      system: true
    version: "{{ metallb_chart_version }}"
    values:
      speaker:
        nodeSelector:
          node-role.kubernetes.io/control-plane: "true"
        tolerations:
          - operator: "Exists"  # i.e. it doesn't care about any taints

      controller:
        nodeSelector:
          node-role.kubernetes.io/control-plane: "true"
        tolerations:
          - operator: "Exists"

- name: "VIPs for MetalLB"
  epfl_si.k8s.k8s:
    definition:
      apiVersion: metallb.io/v1beta1
      kind: IPAddressPool
      metadata:
        name: >-
          {{ item.name.split(".")[0] }}
        namespace: "{{ rke2_metallb_namespace }}"
      spec:
        addresses:
        - "{{ _item_ipv4 }}/32"
        - "{{ _item_ipv6 }}/128"
  with_items: "{{ inventory_vips }}"
  vars:
    _item_ipv4: >-
      {{ item.ipv4 | default(lookup("community.general.dig", item.name)) }}
    _item_ipv6: >-
      {{ item.ipv6 | default(lookup("community.general.dig", item.name, qtype='AAAA')) }}

- name: "L2 advertisement"
  epfl_si.k8s.k8s:
    definition:
      apiVersion: metallb.io/v1beta1
      kind: L2Advertisement
      metadata:
        name: l2
        namespace: metallb-system
      # No `spec`, means that it advertises everything.
