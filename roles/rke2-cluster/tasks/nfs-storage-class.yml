- tags: always
  include_vars: ../../../vars/storage-vars.yml

- name: "`ClusterRepo/nfs-subdir-external-provisioner`"
  epfl_si.k8s.k8s:
    definition:
      apiVersion: catalog.cattle.io/v1
      kind: ClusterRepo
      metadata:
        name: nfs-subdir-external-provisioner
      spec:
        url: https://kubernetes-sigs.github.io/nfs-subdir-external-provisioner/

- name: "nfs-subdir-external-provisioner Helm chart"
  epfl_si.rancher.rancher_helm_chart:
    repository: nfs-subdir-external-provisioner
    chart: nfs-subdir-external-provisioner
    namespace:
      name: "{{ rke2_nfs_storage_namespace }}"
      owned: true
      system: true
    version: 4.0.18
    values:
      nfs:
        server: "{{ storage_nfs_share.server }}"
        path: "{{ storage_nfs_share.path }}"
      storageClass:
        defaultClass: true

- name: create `nfs-storageclass` subdirectory on the NAS
  delegate_to: "{{ rke2_any_worker_node_of_this_cluster }}"
  shell:
    cmd: |
      set -e -x
      mountdir="$(mktemp -d /tmp/mntXXXX)"
      mount -t nfs {{ storage_nfs_share.server }}:{{ storage_nfs_share.path }} "$mountdir" || {
        rmdir "$mountdir"
        exit 2
      }
      trap "umount $mountdir; rmdir $mountdir" EXIT

      wantdir="$mountdir/nfs-storageclass"
      test -d "$wantdir" && exit 0
      mkdir "$wantdir"
  register: _mkdir_nfs
  changed_when: >-
    "+ mkdir" in _mkdir_nfs.stderr
