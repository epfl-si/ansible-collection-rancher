- tags: always
  include_vars: rke2-vars.yml

- include_role:
    name: epfl_si.rancher.cached_login
    apply:
      tags:
      - rke2
      - rke2.login
  tags:
  - rke2
  - rke2.login

- include_tasks:
    file: metallb.yml
    apply:
      tags:
        - rke2
        - rke2.metallb
  tags:
    - rke2
    - rke2.metallb

- include_tasks:
    file: nfs-storage-class-uninstall.yml
    apply:
      tags:
        - rke2.storage.uninstall
  tags: rke2.storage.uninstall
  when: >-
    "rke2.storage.uninstall" in ansible_run_tags

- include_tasks:
    file: nfs-storage-class.yml
    apply:
      tags:
        - rke2
        - rke2.storage
        - rke2.storage.nfs
  tags:
    - rke2
    - rke2.storage
    - rke2.storage.nfs

- include_tasks:
    file: longhorn.yml
    apply:
      tags:
        - rke2
        - rke2.longhorn
  tags:
    - rke2
    - rke2.longhorn

- include_tasks:
    file: cloud-native-postgres.yml
    apply:
      tags:
        - rke2
        - rke2.storage
        - rke2.storage.postgres
  tags:
    - rke2
    - rke2.storage
    - rke2.storage.postgres

- include_tasks:
    file: monitoring.yml
    apply:
      tags:
        - rke2
        - rke2.monitoring
  tags:
    - rke2
    - rke2.monitoring
