- tags: always
  include_vars: ../../../vars/versions.yml

- name: "`ClusterRepo/signoz`"
  epfl_si.k8s.k8s:
    definition:
      apiVersion: catalog.cattle.io/v1
      kind: ClusterRepo
      metadata:
        name: signoz
      spec:
        url: https://charts.signoz.io

- name: "`signoz/clickhouse` Helm chart"
  epfl_si.rancher.rancher_helm_chart:
    repository: signoz
    chart: clickhouse
    namespace:
      name: "{{ rke2_signoz_namespace }}"
      owned: true
      system: true
    version: "{{ clickhouse_chart_version }}"

- name: "`signoz/signoz` Helm chart"
  epfl_si.rancher.rancher_helm_chart:
    repository: signoz
    chart: signoz
    namespace:
      name: "{{ rke2_signoz_namespace }}"
    version: "{{ signoz_chart_version }}"
    values:
      clickhouse:
        nameOverride: clickhouse

- name: "`signoz/k8s-infra` Helm chart"
  epfl_si.rancher.rancher_helm_chart:
    repository: signoz
    chart: k8s-infra
    namespace:
      name: "{{ rke2_signoz_namespace }}"
    version: "{{ k8s_infra_chart_version }}"
    values:
      global:
          cloud: others
          clusterName: gitlab
          deploymentEnvironment: '{{ inventory_deployment_stage }}'
      otelCollectorEndpoint: signoz-otel-collector:4317
