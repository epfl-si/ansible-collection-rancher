# Prometheus-(and-more-)as-a-service for your RKE2 cluster

- tags: always
  include_vars:
    name: monitoring_secrets
    file: monitoring-secrets.yml

- name: "`Secret/external-alertmanager-configs`"
  epfl_si.k8s.k8s:
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: external-alertmanager-configs
        namespace: cattle-monitoring-system
      stringData:
        alertmanager-configs.yaml: |
          - scheme: https
            static_configs: ["targets": ["am.noc.fsd.team"]]
            basic_auth:
              username: "{{ monitoring_secrets.alertmanager.username }}"
              password: >-
                {{ monitoring_secrets.alertmanager.password
                | eyaml(monitoring_secrets.eyaml_keys) }}
            alert_relabel_configs:
            - target_label: service
              replacement: gitlab

- name: "`Middleware/prometheus-basicauth`"
  # https://doc.traefik.io/traefik/reference/routing-configuration/http/middlewares/basicauth/#configuration-examples
  # under “Kubernetes” tab
  epfl_si.k8s.k8s:
    definition:
      apiVersion: traefik.io/v1alpha1
      kind: Middleware
      metadata:
        name: prometheus-basicauth
        namespace: cattle-monitoring-system
      spec:
        basicAuth:
          secret: prometheus-basicauth

- name: "`Secret/prometheus-basicauth`"
  epfl_si.k8s.k8s:
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: prometheus-basicauth
        namespace: cattle-monitoring-system
      stringData:
        # The sybilline phrase “The option users supports Kubernetes secrets.” at
        # https://doc.traefik.io/traefik/reference/routing-configuration/http/middlewares/basicauth/#kubernetes-secrets
        # is apparently supposed to mean this:
        users: |
          {% for a in monitoring_secrets.prometheus.basicauth %}
          {{ a.user }}:{{ a.password
                          | eyaml(monitoring_secrets.eyaml_keys)
                          | ansible.builtin.password_hash(
                                hashtype="bcrypt",
                                salt=monitoring_secrets.prometheus.basicauth_salt) }}
          {% endfor %}

- name: "`rancher` Helm repository"
  epfl_si.k8s.helm_repository:
    name: rancher
    repo_url: https://charts.rancher.io/

- name: "`Namespace/cattle-monitoring-system`"   # The chart won't let you choose another
  epfl_si.rancher.namespace:
    name: cattle-monitoring-system
    is_system: true

- name: "`rancher-monitoring` Helm chart"
  epfl_si.k8s.helm:
    name: rancher-monitoring
    namespace: "cattle-monitoring-system"
    chart_ref: rancher/rancher-monitoring
    force: >-
      {{ helm_force is defined }}
    values:
      rke2Etcd:
        enabled: true
      rke2ControllerManager:
        enabled: true
      rke2Scheduler:
        enabled: true
      rke2Proxy:
        enabled: true
      grafana:
        enabled: false
      alertmanager:
        enabled: false
      prometheus:
        prometheusSpec:
          # This is the “small T-shirt” configuration, whereby only one
          # Prometheus instance in the cluster monitors everything.
          serviceMonitorSelectorNilUsesHelmValues: false
          serviceMonitorSelector: {}
          podMonitorSelectorNilUsesHelmValues: false
          podMonitorSelector: {}
          ruleSelectorNilUsesHelmValues: false
          ruleSelector: {}
          # Optional: pick up alerts from other namespaces too
          ruleNamespaceSelector: {}
          serviceMonitorNamespaceSelector: {}
          podMonitorNamespaceSelector: {}
          # We want storage with that:
          storageSpec:
            volumeClaimTemplate:
              spec:
                storageClassName: nfs-client
                accessModes: ["ReadWriteMany"]
                resources:
                  requests:
                    storage: 50Gi   # Required, even though Kubernetes doesn't actually allocate anything
          # Connect to the team's external NOC.
          # https://github.com/rancher/charts/blob/main/charts/rancher-monitoring/values.yaml#L2361
          additionalAlertManagerConfigsSecret:
            name: external-alertmanager-configs
            key: alertmanager-configs.yaml
        ingress: >-
          {{ _ingress_expose_prometheus
          | default({ "enabled": False }) }}
      defaultRules:
        disabled:
          Watchdog: true
    post_renderer: "{{ role_path }}/scripts/rancher-monitoring-post-renderer"

  vars:
    _hosts: [ "{{ rke2_cluster_expose_prometheus_as_hostname }}" ]
    _ingress_expose_prometheus:
      # Will be `is not defined` (in the Ansible sense) if any consumed vars is missing,
      # which is fine (see `ingress: >-` stanza, above).
      enabled: true
      ingressClassName: traefik
      hosts: "{{ _hosts }}"
      annotations:
        # https://doc.traefik.io/traefik/v2.2/routing/providers/kubernetes-ingress/
        traefik.ingress.kubernetes.io/router.middlewares: >-
          cattle-monitoring-system-prometheus-basicauth@kubernetescrd
      tls:
        - secretName: gitlab-tls   # Courtesy ../../gitlab-tls/tasks/tls.yml
          hosts: "{{ _hosts }}"
