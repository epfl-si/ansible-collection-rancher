# Secrets that make up /etc/gitlab/gitlab-secrets.json in Kubernetes
#
# Contrary to what we do (or used to do and might stop doing anytime)
# on the gitlab.epfl.ch VM, in Kubernetes we store absolutely all
# secrets in the configuration-as-code - even those that are useless -
# so that the gitlab-secrets.json file may be mounted read-only.
#
# To edit the encrypted secrets below, you need eyaml installed.
# Familiarize yourself with
# https://puppet.com/blog/encrypt-your-data-using-hiera-eyaml first.
# The edit command goes like this,
#
#   ansible-deps-cache/bin/eyaml edit -d \
#     --pkcs7-public-key eyaml/epfl_gitlab.ic_gitlab.pkcs7.pem \
#     roles/gitlab-k8s/vars/gitlab-secrets.yml
#
# 💡 This *will not* decrypt anything for you because chances are, you
# don't need to decrypt secrets (YA RLY). For those cases where you
# do, wielding the private key from Keybase is left as an exercise to
# the reader.
#
# All top-level data structures mimic the one in the
# gitlab-secrets.json file, in such a way that merging them with a
# chain of | merge_struct creates the structure for a complete
# gitlab-secrets.json with no omissions, as per above.
gitlab_secrets: |
  {{ _gitlab_precious_secrets |
     merge_dict_deep(_gitlab_throwaway_secrets) |
     merge_dict_deep(_gitlab_unused_secrets) }}

########################
### Precious secrets ###
########################
# If one were to lose these, encrypted SQL columns in database backups or
# other things that clients persist for long-ish times (e.g. runner
# tokens) would be rendered unusable.
_gitlab_precious_secrets:
  gitlab_rails:
    # Those are adherent to the PostgreSQL database; see
    # https://docs.gitlab.com/ee/development/application_secrets.html
    secret_key_base: >-
      {{
      "ENC[PKCS7,]"
      | eyaml(eyaml_keys) }}
    db_key_base: >-
      {{
      "ENC[PKCS7,]"
      | eyaml(eyaml_keys) }}
    # Those appear to be adherent to things clients save for a long-ish
    # amount of time; see
    # https://docs.gitlab.com/charts/backup-restore/restore.html#restore-the-rails-secrets
    openid_connect_signing_key: >-
      {{
      "ENC[PKCS7,]"
      | eyaml(eyaml_keys) }}
    ci_jwt_signing_key: >-
      {{
      "ENC[PKCS7,]"
      | eyaml(eyaml_keys) }}
    # https://docs.gitlab.com/omnibus/update/gitlab_13_changes.html
    # and https://docs.gitlab.com/charts/installation/secrets.html#gitlab-rails-secret
    encrypted_settings_key_base: >-
      {{
      "ENC[PKCS7,]"
      | eyaml(eyaml_keys) }}

########################
### Throwaway secrets ##
########################
# As far as we can determine, those don't participate in any
# encryption at rest, meaning that you should be able to change
# them from time to time. YMMV
_gitlab_throwaway_secrets:
  gitlab_rails:
    otp_key_base: >-
      {{
      "ENC[PKCS7,]"
      | eyaml(eyaml_keys) }}

  gitlab_workhorse:
    secret_token: >-
      {{
      "ENC[PKCS7,]"
      | eyaml(eyaml_keys) }}
  gitlab_shell:
    secret_token: >-
      {{
      "ENC[PKCS7,]"
      | eyaml(eyaml_keys) }}

######################
### Unused secrets ###
######################
# We don't use these features of Omnnibus Gitlab at the moment. We
# still want to hoard values for these secrets, so that Omnibus won't
# attempt to mutate the secrets.json file inside the Kubernetes
# serving pods.

_gitlab_unused_secrets:
  # We don't (currently) use Gitlab pages
  gitlab_pages:
    gitlab_secret: null
    gitlab_id: null
    auth_secret: >-
      {{
      "ENC[PKCS7,]"
      | eyaml(eyaml_keys) }}
    api_secret_key: >-
      {{
      "ENC[PKCS7,]"
      | eyaml(eyaml_keys) }}
  gitlab_kas:
    api_secret_key: >-
      {{
      "ENC[PKCS7,]"
      | eyaml(eyaml_keys) }}

  # We don't (currently) use Grafana
  grafana:
    secret_key: >-
      {{
      "ENC[PKCS7,]"
      | eyaml(eyaml_keys) }}
    gitlab_secret: >-
      {{
      "ENC[PKCS7,]"
      | eyaml(eyaml_keys) }}
    gitlab_application_id: >-
      {{
      "ENC[PKCS7,]"
      | eyaml(eyaml_keys) }}
    admin_password: >-
      {{
      "ENC[PKCS7,]"
      | eyaml(eyaml_keys) }}
    metrics_basic_auth_password: null
  registry:
