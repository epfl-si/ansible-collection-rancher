ssh_secrets:
  ssh_host_dsa_key: "{{ _ssh_host_dsa_key | eyaml(eyaml_keys) }}"
  ssh_host_dsa_key.pub: |
    ssh-dss  root@gitlab.si.epfl.ch
  ssh_host_key: "{{ _ssh_host_key__base64 | eyaml(eyaml_keys) | b64decode }}"
  ssh_host_key.pub: |
    2048 65537  root@gitlab.si.epfl.ch
  ssh_host_ecdsa_key: "{{ _ssh_host_ecdsa_key | eyaml(eyaml_keys) }}"
  ssh_host_ecdsa_key.pub: |
    ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBMSp+9rMiu8d1EIZOTWFMYU9l40LbZAU8g4EX52prrILJwejwJpiM9bxObzlG9ddwd16WVxFRavq9l0GyylIacw= 
  ssh_host_ed25519_key: "{{ _ssh_host_ed25519_key | eyaml(eyaml_keys) }}"
  ssh_host_ed25519_key.pub: |
    ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIGAJUOtRCrsoMnO0yoU/qN0fQvR8m2XmaDUXNBqRTqbh 
  ssh_host_rsa_key: "{{ _ssh_host_rsa_key | eyaml(eyaml_keys) }}"
  ssh_host_rsa_key.pub: |
    ssh-rsa  

# to edit the encrypted secrets below, you need eyaml installed.
# Familiarize yourself with
# https://puppet.com/blog/encrypt-your-data-using-hiera-eyaml first.
# The edit command goes like this,
#
#   ansible-deps-cache/bin/eyaml edit -d \
#     --pkcs7-public-key eyaml/epfl_gitlab.pkcs7.pem \
#     roles/gitlab-k8s/vars/ssh-secrets.yml
#
# 💡 This *will not* decrypt anything for you because chances are, you
# don't need to decrypt secrets (YA RLY). For those cases where you
# do, wielding the private key from Keybase is left as an exercise to
# the reader.

_ssh_host_dsa_key: ENC[PKCS7,]

_ssh_host_key__base64: ENC[PKCS7,]

_ssh_host_ecdsa_key: ENC[PKCS7,]

_ssh_host_ed25519_key: ENC[PKCS7,]

_ssh_host_rsa_key: ENC[PKCS7,]

