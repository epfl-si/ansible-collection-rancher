- tags:
    - backups
    - crontab
  name: "{{ backup_crontab }}"
  copy:
    dest: "{{ backup_crontab }}"
    content: |
        #!/bin/sh

        set -e

        DUMPFILE=/srv/gitlab/backup/postgresql_dump.sql

        (
          docker exec postgresql_prod pg_dumpall --roles-only -c -U postgres | \
              grep -Pv '^(DROP|CREATE|ALTER) ROLE postgres'                  | \
              sed 's/DROP \([^ ]*\)/DROP \1 IF EXISTS/'
          echo "DROP DATABASE IF EXISTS gitlabhq_production;"
          docker exec postgresql_prod pg_dump -C -U postgres gitlabhq_production
        ) > $DUMPFILE.NEW
        mv $DUMPFILE.NEW $DUMPFILE

- tags:
    - backups
    - logrotate
  name: "{{ backup_logrotate_conf }}"
  copy:
    dest: "{{ backup_logrotate_conf }}"
    content: |
      # GitLab logrotate settings
      # based on: http://stackoverflow.com/a/4883967

      /srv/gitlab/backup/postgresql_dump.sql {
          daily
          missingok
          rotate 90
          compress
          copy
          notifempty
      }
