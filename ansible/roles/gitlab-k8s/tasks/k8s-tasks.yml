- include_tasks:
    file: k8s-deps.yml
    apply:
      tags:
        - k8s
        - k8s.deps
  tags:
    - k8s
    - k8s.deps

- include_tasks:
    file: k8s-wipe.yml
    apply:
      tags:
        - k8s.wipe
  tags:
    - never
    - k8s.wipe

- name: "{{ k8s_namespace }} namespace"
  community.kubernetes.k8s:
    name: "{{ k8s_namespace }}"
    api_version: v1
    kind: Namespace
    state: present

- include_tasks:
    file: k8s-secrets.yml
    apply:
      tags:
        - k8s
        - k8s.secrets
  tags:
    - k8s
    - k8s.secrets

- include_tasks:
    file: k8s-redis.yml
    apply:
      tags:
        - k8s
        - k8s.redis
  tags:
    - k8s
    - k8s.redis

- include_tasks:
    file: k8s-gitlab.yml
    apply:
      tags:
        - k8s
        - k8s.gitlab
  tags:
    - k8s
    - k8s.gitlab
    - k8s.gitlab.redeploy
