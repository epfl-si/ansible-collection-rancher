- name: "gitlab ssh Service (visible at cluster edge)"
  community.kubernetes.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: ssh-lb
        namespace: "{{ k8s_namespace }}"
      spec:
        type: LoadBalancer
        ports:
          - name: ssh
            protocol: TCP
            nodePort: 30022  ## Ingress traffic arrives on this port
            port: 22         ## Egress traffic goes to that port on matching
                             ## pods (by “selector”, below)
        selector:
          app: gitlab
