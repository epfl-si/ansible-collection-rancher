[databases]
gitlabhq_production=host=gitlab.epfl.ch port=54321 dbname=gitlabhq_production

[pgbouncer]
listen_port=6432
listen_addr=0.0.0.0
auth_file=/secrets/userlist.txt
auth_type=md5
pidfile=/opt/bitnami/pgbouncer/tmp/pgbouncer.pid
logfile=/opt/bitnami/pgbouncer/logs/pgbouncer.log
admin_users=gitlab
client_tls_sslmode=disable
server_tls_sslmode=require
