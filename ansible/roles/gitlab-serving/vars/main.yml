gitlab_image_name: "epflsti/gitlab-docker:{{ gitlab_version }}"
environment_name: >-
  {{ "prod" if inventory_hostname == "gitlabprod"
     else "staging" }}

serving_config_dir: "/srv/gitlab/config/{{ inventory_hostname }}"

# TODO: this scheme is done this way for historical reasons.
socket_suffix: >-
      {{ "-staging" if inventory_hostname == "gitlabstaging"
         else "" }}
