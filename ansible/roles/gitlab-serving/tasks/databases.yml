- include_vars: database-vars.yml
  tags: always

- name: databases (production)
  when: inventory_hostname == "gitlabprod"
  docker_compose:
    # TODO: the precise container name for the production Postgres is
    # adherent with ../../gitlab-backups/tasks/main.yml as well as a couple of
    # Wiki pages, e.g.
    # https://gitlab.com/epfl-idevfsd/gitlab-docker/-/wikis/RunbookControlesApresMaJ
    project_name: gitlab-docker
    definition:
      version: "3.3"
      services:
        postgresql_prod:
          image: postgres:12
          logging:
            options:
              max-size: 50m
              max-file: "3"
          volumes:
            - "/srv/gitlab/postgresql/data:/var/lib/postgresql/data"
            - "/srv/gitlab/logs/postgresql:/var/log"
            - "/srv/gitlab/run/postgres-socket/:/run/postgresql/"
            - "/srv/gitlab/config/postgresql/passwd:/etc/passwd:ro"
            ## Uncomment the following lines *only* when upgrading PostgreSQL:
            # - "./staging/00-create-db.sql:/docker-entrypoint-initdb.d/00-create-db.sql:ro"
            # - "/srv/gitlab/backup/postgresql_dump.sql:/docker-entrypoint-initdb.d/10-postgresql_dump.sql:ro"
          environment:
            POSTGRES_PASSWORD: "roo3bezahBo6bohH3aY9"

        redis_prod:
          image: redis:latest
          logging:
            options:
              max-size: 50m
              max-file: "3"
          volumes:
            - "/srv/gitlab/config/redis:/usr/local/etc/redis"
            - "/srv/gitlab/run/redis-socket:/run/redis"
          command:
            - redis-server
            - /usr/local/etc/redis/redis.conf

- name: Staging scripts directory ("{{ postgres_staging_scripts_dir }}")
  when: inventory_hostname == "gitlabstaging"
  file:
    path: "{{ postgres_staging_scripts_dir }}"
    state: directory

- name: 'Staging PostgreSQL: "log-queries.sh" script'
  when: inventory_hostname == "gitlabstaging"
  copy:
    dest: "{{ postgres_staging_scripts_dir }}/log-queries.sh"
    mode: "0755"
    content: |
      #!/bin/bash
      # Found on https://github.com/Roconda/docker-postgres-logging/blob/master/Dockerfile
      set -e

      sed -ri "s/^#log_statement.*/log_statement = 'all'/g" /var/lib/postgresql/data/postgresql.conf

- name: 'Staging PostgreSQL: SQL startup script'
  when: inventory_hostname == "gitlabstaging"
  copy:
    dest: "{{ postgres_staging_scripts_dir }}/00-create-db.sql"
    content: |
       -- This runs first to create the staging DB (look for
       -- postgresql_staging in ../docker-compose.yml), before
       -- restoring the daily backup.
       
       -- This is actually the production database, but the name is what it is.
       CREATE DATABASE gitlabhq_production;
       
       -- The only reasons these are here is so that the daily backup can DROP them
       -- without failing.
       CREATE ROLE "gitlab";
       CREATE ROLE "gitlab-psql";

- name: 'PostgreSQL database (staging)'
  when: inventory_hostname == "gitlabstaging"  # TODO: refactor to
                                               # share code with the
                                               # prod database
  docker_container:
    name: "postgresql_{{ environment_name }}"
    image: postgres:12
    detach: yes
    restart_policy: unless-stopped
    # Kick the staging database (so that it reloads from a production
    # backup) whenever we build a new image:
    restart: >-
      {{ (environment_name == "staging")
         and (_serving_image is defined)
         and (_serving_image is changed) }}
    log_driver: json-file
    log_options:
      max-size: 50m
      max-file: "3"
    volumes: "{{ volumes[environment_name] }}"
    env:
      POSTGRES_PASSWORD: "roo3bezahBo6bohH3aY9"  # TODO: generate a stable password here.
                                                 # (It just needs to be set; the value isn't
                                                 # shared anywhere else.)
  vars:
    volumes:
      staging:
        # The staging database is *not* persistent; instead, it
        # reloads from a production backup every time it starts up.
        #
        # As per https://hub.docker.com/_/postgres/, SQL / shell
        # scripts in /docker-entrypoint-initdb.d get executed at
        # startup:
        - "{{ postgres_staging_scripts_dir }}/log-queries.sh:/docker-entrypoint-initdb.d/log-queries.sh:ro"
        - "{{ postgres_staging_scripts_dir }}/00-create-db.sql:/docker-entrypoint-initdb.d/00-create-db.sql:ro"
        - "/srv/gitlab/backup/postgresql_dump.sql:/docker-entrypoint-initdb.d/10-postgresql_dump.sql:ro"
        - "/srv/gitlab/run/postgres-socket-staging/:/run/postgresql/"
        - "/srv/gitlab/config/postgresql/passwd:/etc/passwd:ro"
      prod:
        - "/srv/gitlab/run/postgres-socket:/run/postgresql/"
        - "/srv/gitlab/config/postgresql/passwd:/etc/passwd:ro"

- name: 'Redis (staging)'
  when: inventory_hostname == "gitlabstaging"  # TODO: refactor to
                                               # share code with the
                                               # prod database
  docker_container:
    name: "redis_{{ environment_name }}"
    image: redis:latest
    log_driver: json-file
    log_options:
      max-size: 50m
      max-file: "3"
    volumes:
      - "/srv/gitlab/config/redis:/usr/local/etc/redis"
      - "/srv/gitlab/run/redis-socket-{{ environment_name }}:/run/redis"
    command:
      - redis-server
      - /usr/local/etc/redis/redis.conf
