- name: Serving images
  when: >
    inventory_hostname == "gitlabstaging"
  import_tasks: images.yml
  tags: images

- name: Serving databases
  tags:
    - databases
    - postgres
    - postgresql
    - postgres.reload.staging
    - postgresql.reload.staging
  include_tasks:
    file: databases.yml
    apply:
      tags:
        - databases

- name: Serving containers
  tags:
    - serving
  include_tasks:
    file: serving.yml
    apply:
      tags:
        - serving
