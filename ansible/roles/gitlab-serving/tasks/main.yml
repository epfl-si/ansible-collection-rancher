- name: Serving images
  when: >
    inventory_hostname == "gitlabstaging"
  import_tasks: images.yml
  tags: images

- name: Serving databases
  import_tasks: databases.yml
  tags: databases

- name: Serving containers
  tags:
    - serving
  include_tasks:
    file: serving.yml
    apply:
      tags:
        - serving
