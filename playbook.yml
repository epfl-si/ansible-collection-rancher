- hosts: gitlab_rke2_clusters
  gather_facts: no
  tags:
    - rke2.cluster.create
    - rke2.cluster.upgrade
    - rke2.canal   # For historical reasons
    - rke2.cluster.canal
  tasks:
    - name: "Create cluster in Rancher"
      include_role:
        name: rke2-cluster
        tasks_from: create-or-upgrade.yml
        apply:
          tags:
            - rke2.cluster.create
            - rke2.cluster.upgrade
    - name: "Tweak Canal for Ubuntu 24.04 nodes"
      include_role:
        name: rke2-cluster
        tasks_from: canal.yml
        apply:
          tags:
            - rke2.canal  # For historical reasons
            - rke2.cluster.canal
  vars:
    ansible_rancher_cluster_name: local
    ansible_k8s_kubeconfig: "rke2-credentials-cache/local.yml"

- hosts: gitlab_rke2_vms
  gather_facts: yes   # epfl_si.rancher.rke2_node wants facts
  roles:
    - role: gitlab-node
    - role: xaas-ipv6
    - role: epfl_si.rancher.rke2_node
      vars:
        rancher_rke2_insecure: false
        rancher_rke2_ingress_controller: traefik
        # rancher_rke2_is_worker and rancher_rke2_is_controlplane are set in the inventory.

- hosts: gitlab_rke2_clusters
  gather_facts: no
  roles:
    - role: gitlab-tls
      vars:
        tls_certify_hostnames:
        - gitlab.epfl.ch
        tls_target_namespaces:
        - gitlab
    - role: rke2-cluster
  vars:
    ansible_k8s_kubeconfig: "rke2-credentials-cache/{{ inventory_hostname }}.yml"

- hosts: gitlab_rke2_namespaces
  gather_facts: no
  roles:
    - role: rke2-gitlab
  vars:
    ansible_k8s_kubeconfig: "rke2-credentials-cache/{{ inventory_hostname }}.yml"
